<<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Jogo das Bolinhas</title>

<style>
body{
    margin:0;
    overflow:hidden;
    background:black;
}

canvas{
    display:block;
}

#painel{
    position:absolute;
    top:10px;
    left:10px;
    background:white;
    padding:10px;
}

button{
    padding:10px;
}
</style>

</head>
<body>

<div id="painel">
    Pontos: <span id="pontos">0</span>
    <br><br>
    <button onclick="comecar()">Começar</button>
</div>

<canvas id="tela"></canvas>

<script>

var canvas = document.getElementById("tela");
var ctx = canvas.getContext("2d");

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

var bolas = [];
var pontos = 0;
var jogando = false;

function comecar(){

    bolas = [];
    pontos = 0;
    jogando = true;

    document.getElementById("pontos").innerHTML = pontos;

    for(var i=0;i<10;i++){

        bolas.push({
            x:Math.random()*canvas.width,
            y:Math.random()*canvas.height,
            r:20,
            dx:2,
            dy:2
        });

    }

}

canvas.onclick = function(e){

    if(!jogando){
        return;
    }

    var x = e.clientX;
    var y = e.clientY;

    for(var i=0;i<bolas.length;i++){

        var b = bolas[i];

        var d = Math.sqrt((b.x-x)*(b.x-x)+(b.y-y)*(b.y-y));

        if(d < b.r){

            pontos++;

            document.getElementById("pontos").innerHTML = pontos;

            b.x = Math.random()*canvas.width;
            b.y = Math.random()*canvas.height;

        }

    }

}

function desenhar(){

    ctx.clearRect(0,0,canvas.width,canvas.height);

    if(jogando){

        for(var i=0;i<bolas.length;i++){

            var b = bolas[i];

            b.x += b.dx;
            b.y += b.dy;

            if(b.x > canvas.width || b.x < 0){
                b.dx = -b.dx;
            }

            if(b.y > canvas.height || b.y < 0){
                b.dy = -b.dy;
            }

            ctx.beginPath();
            ctx.arc(b.x,b.y,b.r,0,Math.PI*2);
            ctx.fillStyle = "red";
            ctx.fill();

        }

    }

    requestAnimationFrame(desenhar);

}

desenhar();

</script>

</body>
</html>
