<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Clica na Bola</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:"Manrope",sans-serif;
}

body{
    background:#f7f8fa;
    overflow:hidden;
    user-select:none;
}

header{
    text-align:center;
    margin-top:45px;
}

h1{
    font-size:48px;
    font-weight:700;
    color:#111827;
    letter-spacing:-1px;
}

#placar{
    margin-top:10px;
    font-size:20px;
    color:#6b7280;
    font-weight:500;
}

#bola{
    width:85px;
    height:85px;
    border-radius:50%;
    background:#2563eb;
    position:absolute;
    cursor:pointer;
    box-shadow:0 12px 35px rgba(37,99,235,.25);
    transition:.18s ease;
}

#bola:hover{
    transform:scale(1.08);
}

#bola:active{
    transform:scale(.95);
}
</style>

</head>
<body>

<header>
    <h1>Clica na Bola</h1>
    <div id="placar">Pontos: 0</div>
</header>

<div id="bola"></div>

<script>
const bola = document.getElementById("bola");
const placar = document.getElementById("placar");

let pontos = 0;

function moverBola(){
    const topoMin = 150;

    const x = Math.random() * (window.innerWidth - bola.offsetWidth);
    const y = topoMin + Math.random() * (window.innerHeight - topoMin - bola.offsetHeight);

    bola.style.left = x + "px";
    bola.style.top = y + "px";
}

bola.addEventListener("click",()=>{
    pontos++;
    placar.textContent = "Pontos: " + pontos;
    moverBola();
});

window.addEventListener("resize",moverBola);

moverBola();
</script>

</body>
</html>
